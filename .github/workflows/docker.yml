name: Docker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: covscript/homepage

jobs:
  build-and-push:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: 'recursive'

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Build frontend
        run: npm ci && npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          # Use the classic "docker" driver so `load: true` dumps images into
          # the host daemon where docker compose can reach them. Registry
          # cache import/export requires "docker-container", but we trade
          # that for test-before-push safety.
          driver: docker

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # ------------------------------------------------------------------
      # Build phase — all images loaded into local Docker (push: false).
      # Each image gets TWO tag sets: the final ghcr.io tag for pushing
      # later, plus a fixed `covscript-*-ci` alias so docker-compose.ci.yml
      # doesn't need to know the per-build sha / branch.
      # ------------------------------------------------------------------

      - name: Build base image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.base
          push: false
          load: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/base:${{ steps.meta.outputs.version }}
            covscript-base:ci

      - name: Build web image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.web
          push: false
          load: true
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/base:${{ steps.meta.outputs.version }}
          tags: |
            ${{ steps.meta.outputs.tags }}
            covscript-web:ci
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build sandbox image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.sandbox
          push: false
          load: true
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/base:${{ steps.meta.outputs.version }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/sandbox:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/sandbox:latest
            covscript-sandbox:ci
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build watchdog image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.watchdog
          push: false
          load: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/watchdog:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/watchdog:latest
            covscript-watchdog:ci
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build Docker socket proxy image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.docker-proxy
          push: false
          load: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/docker-proxy:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/docker-proxy:latest
            covscript-docker-proxy:ci
          labels: ${{ steps.meta.outputs.labels }}

      # ------------------------------------------------------------------
      # Test phase — spin up the full stack, run the test suite, tear down.
      # Any non-zero exit code stops the job and prevents the push.
      # ------------------------------------------------------------------

      - name: Start services
        run: |
          docker compose -f docker-compose.ci.yml up -d
          # Wait for both services to accept connections
          for i in $(seq 1 30); do
            if curl -s -o /dev/null http://127.0.0.1:8080/ && \
               curl -s -o /dev/null http://127.0.0.1:8088/api/stats; then
              echo "Both services ready (attempt $i)."
              break
            fi
            sleep 1
          done

      - name: Functional tests (web)
        run: ./tests/test_web.sh

      - name: Functional tests (sandbox)
        run: |
          # The web suite makes two proxied /api/run calls. Wait for the
          # sandbox's 10-per-minute limit to reset before its 10-call suite.
          sleep 61
          ./tests/test_sandbox.sh --quick

      - name: Stress tests
        run: |
          # test_sandbox.sh --quick consumed ~8 /api/run calls in the
          # current rate-limit window.  Wait for a fresh window so the
          # sandbox burst scenario reports accurate 10×200 + 40×429.
          sleep 61
          ./tests/stress_all.sh

      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== sandbox logs ==="
          docker compose -f docker-compose.ci.yml logs sandbox || true
          echo "=== web logs ==="
          docker compose -f docker-compose.ci.yml logs web || true

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v

      # ------------------------------------------------------------------
      # Push phase — only on main-branch push, and only if tests passed.
      # The ghcr.io tags were already applied during the build phase; we
      # just push them.
      # ------------------------------------------------------------------

      - name: Push base image
        if: github.event_name != 'pull_request'
        run: docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/base:${{ steps.meta.outputs.version }}

      - name: Push web image
        if: github.event_name != 'pull_request'
        run: |
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            docker push "$tag"
          done <<< "${{ steps.meta.outputs.tags }}"

      - name: Push sandbox image
        if: github.event_name != 'pull_request'
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/sandbox:${{ steps.meta.outputs.version }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/sandbox:latest

      - name: Push watchdog image
        if: github.event_name != 'pull_request'
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/watchdog:${{ steps.meta.outputs.version }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/watchdog:latest

      - name: Push Docker socket proxy image
        if: github.event_name != 'pull_request'
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/docker-proxy:${{ steps.meta.outputs.version }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/docker-proxy:latest
