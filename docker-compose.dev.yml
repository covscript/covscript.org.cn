# Local development — builds images from source
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "80:8080"
    depends_on:
      - sandbox
    restart: always
    networks:
      - internal

  sandbox:
    build:
      context: .
      dockerfile: Dockerfile.sandbox
    expose:
      - "8088"
    volumes:
      - sandbox_data:/app/data
    restart: always
    read_only: true
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec,size=1m,mode=1777
    pids_limit: 50
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  sandbox_data:
