# Local development — builds images from source
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "8080:8080"
    depends_on:
      - sandbox
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  sandbox:
    build:
      context: .
      dockerfile: Dockerfile.sandbox
    expose:
      - "8088"
    volumes:
      - sandbox_data:/app/data
    restart: always
    read_only: true
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec,size=1m,mode=1777
    pids_limit: 50
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G

volumes:
  sandbox_data:
