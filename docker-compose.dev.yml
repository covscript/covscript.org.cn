# Local development — builds images from source
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: covscript-web
    ports:
      - "8080:8080"
    depends_on:
      - sandbox
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  sandbox:
    build:
      context: .
      dockerfile: Dockerfile.sandbox
    container_name: covscript-sandbox
    expose:
      - "8088"
    volumes:
      - sandbox_data:/app/data
    tmpfs:
      - /tmp:rw,nosuid,nodev,exec,size=16m,mode=1777
    restart: always
    read_only: true
    pids_limit: 50
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
          pids: 50

  docker-proxy:
    build:
      context: .
      dockerfile: Dockerfile.docker-proxy
    container_name: covscript-docker-proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    tmpfs:
      - /tmp:rw,nosuid,nodev,size=4m
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - SETGID
    security_opt:
      - no-new-privileges:true
    restart: always

  watchdog:
    build:
      context: .
      dockerfile: Dockerfile.watchdog
    container_name: covscript-watchdog
    environment:
      - DOCKER_HOST=tcp://docker-proxy:2375
      - SANDBOX_CONTAINER=covscript-sandbox
      - WEB_CONTAINER=covscript-web
      - WEB_HEALTH_URL=http://web:8080/healthz
      - INTERVAL_SEC=30
      - MAX_FAILURES=3
    depends_on:
      - docker-proxy
      - sandbox
      - web
    restart: always

volumes:
  sandbox_data:
